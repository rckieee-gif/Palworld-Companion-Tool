name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Windows / Python 3.13
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            src/palsav/pyproject.toml
            src/palsav/palooz/pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./src/palsav/palooz
          python -m pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Compile retained source
        shell: pwsh
        run: python -m compileall -q src start.py build/nuitka/build_nuitka.py build/installer/build_installer.py build/package_release.py build/verify_build.py

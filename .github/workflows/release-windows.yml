name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows package
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            src/palsav/pyproject.toml
            src/palsav/palooz/pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./src/palsav/palooz
          python -m pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build one-file executable
        shell: pwsh
        run: python build/nuitka/build_nuitka.py --onefile

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PalworldCompanionTools-Windows
          path: dist/PalworldCompanionTools-*.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem dist -Filter "PalworldCompanionTools-*.exe" | Select-Object -First 1
          if (-not $asset) { throw "Release executable was not found." }
          gh release create $env:GITHUB_REF_NAME $asset.FullName --generate-notes --title "Palworld Companion Tools $env:GITHUB_REF_NAME"

name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            src/palsav/pyproject.toml
            src/palsav/palooz/pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./src/palsav/palooz
          python -m pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Validate bundled game data
        shell: pwsh
        run: python scripts/validate_game_data.py

      - name: Read and validate version
        shell: pwsh
        run: |
          $version = python -c "import sys; sys.path.insert(0, 'src'); from app_info import PRODUCT_VERSION; print(PRODUCT_VERSION)"
          if (-not $version) { throw "Application version was not found." }
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match application version v$version."
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build standalone application
        shell: pwsh
        run: python build/nuitka/build_nuitka.py --standalone

      - name: Verify standalone application
        shell: pwsh
        run: python build/verify_build.py

      - name: Build Windows installer
        shell: pwsh
        run: python build/installer/build_installer.py

      - name: Create portable archive and checksums
        shell: pwsh
        run: python build/package_release.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PalworldCompanionTools-Windows-${{ env.APP_VERSION }}
          path: |
            dist/PalworldCompanionTools-Setup-V*-win-x64.exe
            dist/PalworldCompanionTools-Portable-V*-win-x64.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            Get-ChildItem dist -Filter "PalworldCompanionTools-Setup-V*-win-x64.exe"
            Get-ChildItem dist -Filter "PalworldCompanionTools-Portable-V*-win-x64.zip"
            Get-Item dist/SHA256SUMS.txt
          )
          if ($assets.Count -ne 3) { throw "Expected release artifacts were not found." }
          gh release create $env:GITHUB_REF_NAME $assets.FullName --generate-notes --title "Palworld Companion Tools $env:GITHUB_REF_NAME"
